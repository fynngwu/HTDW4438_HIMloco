policy_path: "{LEGGED_GYM_ROOT_DIR}/logs/flat_htdw_4438/exported/policies/model_800.pt"
xml_path: "{LEGGED_GYM_ROOT_DIR}/resources/robots/htdw_4438/xml/scene.xml"

# 总仿真时长 (秒)
simulation_duration: 360.0
# 仿真步长
simulation_dt: 0.002
# Controller update frequency (meets the requirement of simulation_dt * controll_decimation=0.02; 50Hz)
control_decimation: 2

# 顺序为: [FL_hip, FL_thigh, FL_calf, FR_hip, FR_thigh, FR_calf, RL_hip, RL_thigh, RL_calf, RR_hip, RR_thigh, RR_calf]
kps: [10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10]
kds: [0.3, 0.3, 0.3, 0.3, 0.3, 0.3, 0.3, 0.3, 0.3, 0.3, 0.3, 0.3]

# FL FR
# RL RR
default_angles: [0.0, 0.9, -1.5,  0.0, 0.9, -1.5,
                 0.0, 0.9, -1.5,  0.0, 0.9, -1.5]

# 传感器与动作缩放比例
lin_vel_scale: 2.0
ang_vel_scale: 0.25 
dof_pos_scale: 1.0 
dof_vel_scale: 0.05 
action_scale: 0.25 

cmd_scale: [3.5, 2.0, 1.0]

# 动作与观测空间维度
num_actions: 12
num_obs: 270
num_one_step_obs: 45

# 初始命令 [x速度, y速度, 偏航角速度]
cmd_init: [0, 0, 0]

# 基座初始化高度（与训练 cfg.init_state.pos[2] 对齐）
# init_base_height: 0.15
