policy_path: "{LEGGED_GYM_ROOT_DIR}/logs/flat_opendoge/exported/policies/model_800.pt"
xml_path: "{LEGGED_GYM_ROOT_DIR}/resources/robots/Opendoge/xml/scene.xml"

# 总仿真时长 (秒)
simulation_duration: 360.0
# 仿真步长（与训练配置对齐）
simulation_dt: 0.005
# 控制降采样（与训练配置对齐，控制频率 1 / (dt * decimation) = 100Hz）
control_decimation: 2

# 顺序: [FL_hip, FL_thigh, FL_calf, FR_hip, FR_thigh, FR_calf, RL_hip, RL_thigh, RL_calf, RR_hip, RR_thigh, RR_calf]
kps: [10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10]
kds: [0.3, 0.3, 0.3, 0.3, 0.3, 0.3, 0.3, 0.3, 0.3, 0.3, 0.3, 0.3]

# FL FR
# RL RR
default_angles: [0.0, 0.6, -1.5,  0.0, 0.6, -1.5,
                 0.0, 0.6, -1.5,  0.0, 0.6, -1.5]

# 观测与动作缩放（与训练配置对齐）
lin_vel_scale: 2.0
ang_vel_scale: 0.25
dof_pos_scale: 1.0
dof_vel_scale: 0.05
action_scale: 0.25
cmd_scale: [2.0, 2.0, 0.25]

# 动作与观测维度
num_actions: 12
num_obs: 270
num_one_step_obs: 45

# 初始命令 [x速度, y速度, 偏航角速度]
cmd_init: [0, 0, 0]

# 基座初始化高度（与训练 cfg.init_state.pos[2] 对齐）
init_base_height: 0.15
